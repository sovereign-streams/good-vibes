<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FF6B35">
  <title>Good Vibes — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #FFF8F0;
      color: #2D3436;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1A1410; color: #F5EDE6; }
      .card { background: #241E18; border-color: #3D3328; }
    }
    .card {
      background: #FFFFFF;
      border: 1px solid #F0DFD0;
      border-radius: 20px;
      padding: 48px 32px;
      max-width: 400px;
      box-shadow: 0 4px 12px rgba(45, 52, 54, 0.08);
    }
    .icon { font-size: 64px; margin-bottom: 16px; line-height: 1; }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #FF6B35;
      margin-bottom: 8px;
    }
    p {
      font-size: 15px;
      color: #636E72;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    button {
      font: inherit;
      padding: 12px 32px;
      background: #FF6B35;
      color: white;
      border: none;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
    }
    button:hover { background: #FF8F5E; }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#127749;</div>
    <h1>You're offline</h1>
    <p>
      Good Vibes needs a connection to reach your content providers.
      Check your network and try again — your profiles and preferences
      are still safe on your device.
    </p>
    <button onclick="location.reload()">Try Again</button>
  </div>
</body>
</html>
